<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edycja Użytkownika</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <header class="main-header">
        <div class="admin-navbar">
            <a class="a-links" href="../html/info.html">Strona informacyjna</a>
            <div class="links-admin">
                <a class="a-links admin-only" href="../html/my-profile.html">Mój Profil</a>
                <a class="a-links admin-only" href="../html/posts.html">Posty</a>
                <a class="a-links admin-only" href="../html/users.html">Użytkownicy</a>
                <a class="a-links admin-only" href="../html/statistics.html">Statystyki</a>
                <a class="a-links" id="login-link" href="../index.html">Zaloguj się</a>
            </div>
        </div>

        <nav class="navbar">
            <img src="../img/logo.png" alt="Logo" class="logo" width="170px">
            <ul class="nav-list">
                <li><a class="a-links" href="../index.html#main-section">Strona Główna</a></li>
                <li><a class="a-links" href="../html/cakes.html">Ciasta</a></li>
                <li><a class="a-links" href="../html/birthdaycakes.html#birthdaycakes-section">Torty</a></li>
                <li><a class="a-links" href="../index.html#price-section">Cennik</a></li>
                <li><a class="a-links" href="../index.html#contact-section">Kontakt</a></li>
            </ul>
        </nav>
    </header>

    <main id="post-edit">
        
        <div class="note-card info-card" style="transform: none;">
            <h2 class="title">Edycja Użytkownika:</h2>

            <form id="users-form" class="contact-form">
                <label class="label-edit" for="img-user">Zdjęcie użytkownika:</label>
                <input type="file" id="img-user">

                <label class="label-edit" for="name-user">Imię:</label>
                <input type="text" id="name-user" class="input-main" placeholder="np.Jan"></input>

                <label class="label-edit" for="surname-user">Nazwisko:</label>
                <input type="text" id="surname-user" class="input-main" placeholder="np.Kowalski"></input>

                <label class="label-edit" for="role-user">Rola:</label>
                <input type="text" id="role-user" class="input-main" placeholder="np.Administrator"></input>

                <label class="label-edit" for="email-user">E-mail:</label>
                <input type="email" id="email-user" class="input-main" placeholder="np.jan.kowal@wp.pl"></input>
                
                <div class="buttons">
                    <a href="../html/users.html" class="main-button">Anuluj zmiany</a>
                    <button class="main-button" type="submit">Zapisz zmiany</button>
                </div>
        
            </form>
        </div>

    </main>

    <footer class="main-footer">
        <p>&copy; Natalia Flaszka</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
